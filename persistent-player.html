<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persistent Song Player</title>
    <link rel="stylesheet" href="styles.css">
    <script src="persistent-player.js" defer></script>
</head>
<body>
    <main>
        <section>
            <h2 id="persistent-player-title">Persistent Song Player</h2>
            <p id="persistent-player-status">Ready.</p>
            <div class="video-embed" id="persistent-video-wrap">
                <iframe
                    id="persistent-player-frame"
                    title="Persistent song player"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen>
                </iframe>
            </div>
            <div id="persistent-audio-wrap" style="display: none; margin-top: 0.6rem;">
                <audio id="persistent-player-audio" controls preload="none" style="width: 100%;"></audio>
            </div>
            <p><button type="button" id="persistent-player-stop">Stop Playback</button></p>
        </section>
    </main>
</body>
</html>
