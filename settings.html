    <main>
        <section>
            <h2>Settings</h2>
            <p>Customize your experience with Work Notes.</p>
            
            <h3>Theme</h3>
            <form id="theme-form">
                <label>
                    <input type="radio" name="theme" value="blue" checked>
                    Blue (Aquatic)
                </label><br>
                <label>
                    <input type="radio" name="theme" value="pink">
                    Pink (Pastel)
                </label><br>
                <label>
                    <input type="radio" name="theme" value="green">
                    Green (Nature)
                </label><br>
                <label>
                    <input type="radio" name="theme" value="dark">
                    Dark Mode
                </label><br>
                <label>
                    <input type="radio" name="theme" value="light">
                    Light Clean
                </label><br>
                <label>
                    <input type="radio" name="theme" value="sunset">
                    Sunset Glow
                </label><br>
                <label>
                    <input type="radio" name="theme" value="mint">
                    Mint Breeze
                </label><br>
                <label>
                    <input type="radio" name="theme" value="sand">
                    Sandstone
                </label><br>
                <label>
                    <input type="radio" name="theme" value="custom">
                    Custom Palette
                </label><br>
                <button type="submit">Apply Theme</button>
            </form>

            <h3>Custom Theme Palette</h3>
            <form id="custom-theme-form">
                <div class="palette-grid">
                    <label for="custom-bg-start">Background Gradient Start</label>
                    <input type="color" id="custom-bg-start" name="custom-bg-start" value="#dff5ff">

                    <label for="custom-bg-end">Background Gradient End</label>
                    <input type="color" id="custom-bg-end" name="custom-bg-end" value="#f5fbff">

                    <label for="custom-header-start">Header Gradient Start</label>
                    <input type="color" id="custom-header-start" name="custom-header-start" value="#3a77ac">

                    <label for="custom-header-end">Header Gradient End</label>
                    <input type="color" id="custom-header-end" name="custom-header-end" value="#4f9bd1">

                    <label for="custom-text-color">Body Text Color</label>
                    <input type="color" id="custom-text-color" name="custom-text-color" value="#2e4057">

                    <label for="custom-button-color">Button Color</label>
                    <input type="color" id="custom-button-color" name="custom-button-color" value="#4682b4">
                </div>
                <button type="submit">Save and Apply Custom Theme</button>
            </form>

            <h3>Layout</h3>
            <form id="layout-form">
                <label>
                    <input type="radio" name="layout-mode" value="expanded" checked>
                    Expanded (side rail on desktop)
                </label><br>
                <label>
                    <input type="radio" name="layout-mode" value="compact">
                    Compact (classic top navigation)
                </label><br>
                <button type="submit">Apply Layout</button>
            </form>

            <h3>Alarm Sound</h3>
            <form id="alarm-form">
                <label for="alarm-sound">Choose alarm sound:</label>
                <select id="alarm-sound" name="alarm-sound">
                    <option value="classic">Classic Beep</option>
                    <option value="chime">Soft Chime</option>
                    <option value="pulse">Pulse Alert</option>
                    <option value="bell">Bell Ring</option>
                    <option value="digital">Digital Ping</option>
                    <option value="urgent">Urgent Siren</option>
                    <option value="calm">Calm Tone</option>
                </select>
                <button type="submit">Save Alarm Sound</button>
                <button type="button" id="test-settings-alarm">Test Sound</button>
            </form>
        </section>
    </main>
