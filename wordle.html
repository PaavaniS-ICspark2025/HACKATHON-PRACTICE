    <main>
        <section id="wordle-game">
            <h2>Wordle</h2>
            <p>Guess the secret 5-letter word in 6 tries. Only real 5-letter words are accepted.</p>

            <form id="wordle-form" autocomplete="off">
                <label for="wordle-guess">Enter a 5-letter word</label>
                <input id="wordle-guess" name="guess" type="text" maxlength="5" pattern="[A-Za-z]{5}" required>
                <button type="submit">Guess</button>
                <button type="button" id="wordle-hint">Hint</button>
                <button type="button" id="wordle-reset">New Game</button>
            </form>

            <p id="wordle-status" aria-live="polite"></p>
            <div id="wordle-board" aria-label="Wordle board"></div>
        </section>
    </main>

        <p>&copy; 2026 Work Notes</p>
