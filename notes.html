<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My Notes</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="notes.html">My Notes</a>
            <a href="about.html">About</a>
            <a href="priorities.html">Priorities</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <section id="quick-note">
        <h2>Quick Note</h2>
        <textarea id="quick-text" rows="4" placeholder="Type something..."></textarea>
        <p><small>Your quick note is saved automatically in your browser.</small></p>
    </section>
    <main>
        <section id="note-form">
            <h2>Add a new note</h2>
            <form id="new-note">
                <label for="title">Title:</label>
                <input type="text" id="title" required>
                <label for="content">Content:</label>
                <textarea id="content" rows="4" required></textarea>
                <button type="submit">Save</button>
            </form>
        </section>
        <section id="note-list">
            <h2>Your notes</h2>
            <ul id="notes"></ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Notes Organizer</p>
    </footer>
    <script src="notes.js"></script>
    <script src="main.js" defer></script>
</body>
</html>
