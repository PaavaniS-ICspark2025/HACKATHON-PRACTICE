<!DOCTYPE html>

    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My Notes</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="notes.html">My Notes</a>
            <div class="dropdown">
                <a href="#" class="dropbtn">More Features</a>
                <div class="dropdown-content">
                    <a href="wordle.html">Wordle</a>
                    <a href="sudoku.html">Sudoku</a>
                    <a href="songs.html">Songs</a>
                    <a href="more-features.html#reflections-section">Reflections</a>
                </div>
            </div>
            <div class="dropdown">
                <a href="#" class="dropbtn">Work</a>
                <div class="dropdown-content">
                    <a href="calendar.html">Calendar</a>
                    <a href="priorities.html">Priorities</a>
                    <a href="contact.html">Contacts</a>
                </div>
            </div>
            <div class="dropdown">
                <a href="#" class="dropbtn">Help</a>

                    <a href="settings.html">Settings</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
        </nav>
    </header>
    <section id="quick-note">
        <h2>Quick Note</h2>
        <textarea id="quick-text" rows="4" placeholder="Type something..."></textarea>
        <p><small>Your quick note is saved automatically in your browser.</small></p>
    </section>
    <main>
        <section id="note-form">
            <h2>Add a new note</h2>
            <form id="new-note">
                <label for="title">Title:</label>
                <input type="text" id="title" required>
                <label for="content">Content:</label>
                <textarea id="content" rows="4" required></textarea>
                <button type="submit">Save</button>
            </form>
        </section>
        <section id="note-list">
            <h2>Your notes</h2>
            <ul id="notes"></ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Work Notes</p>
    </footer>
    <script src="notes.js"></script>
    <script src="main.js" defer></script>
</body>
</html>
