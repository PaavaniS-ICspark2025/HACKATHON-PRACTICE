<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku - Work Notes</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
    <script src="sudoku.js" defer></script>
</head>
<body>
    <header>
        <h1>Sudoku</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="notes.html">My Notes</a>
            <div class="dropdown">
                <a href="#" class="dropbtn">More Features</a>
                <div class="dropdown-content">
                    <a href="wordle.html">Wordle</a>
                    <a href="sudoku.html">Sudoku</a>
                    <a href="songs.html">Songs</a>
                </div>
            </div>
            <div class="dropdown">
                <a href="#" class="dropbtn">Work</a>
                <div class="dropdown-content">
                    <a href="calendar.html">Calendar</a>
                    <a href="priorities.html">Priorities</a>
                    <a href="contact.html">Contacts</a>
                </div>
            </div>
            <div class="dropdown">
                <a href="#" class="dropbtn">Help</a>
                <div class="dropdown-content">
                    <a href="about.html">About</a>
                    <a href="settings.html">Settings</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section id="sudoku-game">
            <h2>Sudoku</h2>
            <p>Fill every row, column, and 3x3 box with numbers 1 to 9.</p>

            <div id="sudoku-controls">
                <label for="sudoku-difficulty">Difficulty</label>
                <select id="sudoku-difficulty" aria-label="Sudoku difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
                <button type="button" id="sudoku-new">New Puzzle</button>
                <button type="button" id="sudoku-hint">Hint</button>
                <button type="button" id="sudoku-check">Check Answer</button>
                <button type="button" id="sudoku-solve">Reveal Solution</button>
            </div>

            <p id="sudoku-status" aria-live="polite"></p>
            <div id="sudoku-stats" aria-live="polite">
                <span>Timer: <strong id="sudoku-timer">00:00</strong></span>
                <span>Score: <strong id="sudoku-score">0</strong></span>
                <span>Best Time: <strong id="sudoku-best-time">--:--</strong></span>
            </div>
            <div id="sudoku-board" aria-label="Sudoku board"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Work Notes</p>
    </footer>
</body>
</html>
